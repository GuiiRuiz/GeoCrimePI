<!-- 
  GeoCrime Logo — SVG inline
  Pin de localização com crosshair + lupa
  Uso: referência para favicon e og:image
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 80"
  fill="none"
  role="img"
  aria-label="GeoCrime"
>
  <!-- ── Pin shape ── -->
  <path
    d="M30 4C19.5 4 11 12.5 11 23C11 36.8 30 58 30 58C30 58 49 36.8 49 23C49 12.5 40.5 4 30 4Z"
    stroke="white"
    stroke-width="2.2"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- ── Outer circle of crosshair ── -->
  <circle
    cx="30"
    cy="22"
    r="9"
    stroke="white"
    stroke-width="2"
    fill="none"
  />

  <!-- ── Inner circle of crosshair ── -->
  <circle
    cx="30"
    cy="22"
    r="3.5"
    stroke="white"
    stroke-width="1.8"
    fill="none"
  />

  <!-- ── Crosshair lines ── -->
  <line x1="30" y1="10" x2="30" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="30" y2="34" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="22" y2="22" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="38" y1="22" x2="42" y2="22" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── Magnifying glass handle ── -->
  <line
    x1="36.5"
    y1="28.5"
    x2="43"
    y2="35"
    stroke="white"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- ── Wordmark: "Geo" bold + "Crime" regular ── -->
  <text
    x="58"
    y="32"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    fill="white"
    letter-spacing="-0.5"
  >Geo</text>

  <text
    x="98"
    y="32"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="22"
    font-weight="300"
    fill="white"
    letter-spacing="-0.3"
  >Crime</text>
</svg>
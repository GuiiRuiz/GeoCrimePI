<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoCrime — Mapa de Calor</title>
    <!-- Favicon (opcional, adicione seu próprio) -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <!-- Seus estilos globais (se houver, como variables.css) -->
    <!-- <link rel="stylesheet" href="css/variables.css"> -->
    <!-- Estilos específicos da página do mapa -->
    <link rel="stylesheet" href="css/map-page.css">
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">GeoCrime</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item"><a href="index.html#features" class="nav-link">Funcionalidades</a></li>
                <li class="nav-item"><a href="index.html#how" class="nav-link">Metodologia</a></li>
                <li class="nav-item"><a href="plans.html" class="nav-link">Planos</a></li>
                <li class="nav-item"><a href="index.html" class="nav-link">Sair</a></li>
            </ul>
        </nav>
    </header>

    <main class="map-page-container">
        <section class="map-header">
            <h1>Mapa de Calor — Minas Gerais</h1>
            <p>Dados reais do arquivo MG_microdados_bairro_parcial.csv. Use os filtros para explorar por tipo de crime.</p>
        </section>

        <section id="map-filters-container" class="map-filters">
            <!-- Os botões de filtro serão gerados dinamicamente aqui pelo JavaScript -->
            <button class="map-filter-btn active" onclick="setFilter(this, 'all')">Todos os crimes</button>
        </section>

        <section class="map-container">
            <div id="map-full"></div>
        </section>

        <section class="map-legend-full">
            <div class="map-legend-item">
                <span class="map-legend-color map-legend-color--low"></span>
                <span>Baixa intensidade</span>
            </div>
            <div class="map-legend-item">
                <span class="map-legend-color map-legend-color--medium"></span>
                <span>Média intensidade</span>
            </div>
            <div class="map-legend-item">
                <span class="map-legend-color map-legend-color--high"></span>
                <span>Alta intensidade</span>
            </div>
            <div class="map-legend-item">
                <span class="map-legend-color map-legend-color--very-high"></span>
                <span>Muito alta intensidade</span>
            </div>
        </section>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20n6fi/rpDY/FDkIoBde/kjx+L/XNYLMyAJj/AQGmNA="
        crossorigin=""></script>
    <!-- Leaflet Heatmap JS -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <!-- PapaParse JS (será carregado dinamicamente se não estiver presente, mas é bom ter o fallback) -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script> -->
    <!-- Seu script da página do mapa -->
    <script src="js/map-page.js"></script>
</body>
</html>
